<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8e8f0;
      gap: 32px;
      padding: 24px;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      margin-top: 6px;
      color: #6b6b80;
      font-size: 0.9rem;
    }

    #status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #6b6b80;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }

    #status-dot.connected { background: #22c55e; }

    #canvas-wrap {
      position: relative;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 2px;
      background: #1e1e2e;
      border: 2px solid #2a2a3e;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 60px rgba(167, 139, 250, 0.08);
    }

    .cell {
      width: 52px;
      height: 52px;
      border-radius: 4px;
      background: #ffffff;
      cursor: crosshair;
      transition: transform 0.08s, box-shadow 0.08s;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .cell:hover {
      transform: scale(1.12);
      z-index: 1;
      box-shadow: 0 0 0 2px #a78bfa, 0 4px 16px rgba(167,139,250,0.35);
    }

    .cell.painted {
      animation: pop 0.18s ease-out;
    }

    @keyframes pop {
      0%  { transform: scale(1.25); }
      100%{ transform: scale(1); }
    }

    /* Palette */
    #palette-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #swatches {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      max-width: 580px;
    }

    .swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
    }

    .swatch:hover { transform: scale(1.15); }

    .swatch.active {
      border-color: #a78bfa;
      box-shadow: 0 0 0 2px #a78bfa55;
      transform: scale(1.2);
    }

    #custom-color-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #6b6b80;
      font-size: 0.85rem;
    }

    #custom-color {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    #custom-color::-webkit-color-swatch-wrapper { padding: 0; border-radius: 50%; }
    #custom-color::-webkit-color-swatch { border: 3px solid #2a2a3e; border-radius: 50%; }

    #selected-preview {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #6b6b80;
    }

    #preview-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #2a2a3e;
      transition: background 0.15s;
    }
  </style>
</head>
<body>

  <header>
    <h1>World Canvas</h1>
    <p>Click a pixel, pick a color, paint together.</p>
  </header>

  <div id="status">
    <span id="status-dot"></span>
    <span id="status-text">Connecting…</span>
  </div>

  <div id="canvas-wrap">
    <div id="grid"></div>
  </div>

  <div id="palette-wrap">
    <div id="swatches"></div>
    <div id="custom-color-wrap">
      <label for="custom-color">Custom color</label>
      <input type="color" id="custom-color" value="#a78bfa" />
    </div>
    <div id="selected-preview">
      <span>Selected:</span>
      <span id="preview-dot"></span>
      <span id="preview-hex">#ffffff</span>
    </div>
  </div>

  <script>
    const GRID_SIZE = 10;
    const PALETTE = [
      '#ffffff', '#000000', '#ef4444', '#f97316', '#eab308',
      '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899',
      '#f5f5f5', '#404040', '#fca5a5', '#fdba74', '#fde047',
      '#86efac', '#67e8f9', '#93c5fd', '#c4b5fd', '#f9a8d4',
    ];

    let selectedColor = '#ef4444';

    // --- Build grid ---
    const grid = document.getElementById('grid');
    const cells = [];
    for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.addEventListener('click', () => paintCell(i, selectedColor));
      grid.appendChild(cell);
      cells.push(cell);
    }

    // --- Build palette ---
    const swatchesEl = document.getElementById('swatches');
    PALETTE.forEach(color => {
      const s = document.createElement('div');
      s.className = 'swatch';
      s.style.background = color;
      s.title = color;
      s.addEventListener('click', () => selectColor(color));
      swatchesEl.appendChild(s);
    });

    const customInput = document.getElementById('custom-color');
    customInput.addEventListener('input', () => selectColor(customInput.value));

    function selectColor(color) {
      selectedColor = color;
      document.querySelectorAll('.swatch').forEach(s =>
        s.classList.toggle('active', s.style.background === hexToRgb(color) || s.title === color)
      );
      document.getElementById('preview-dot').style.background = color;
      document.getElementById('preview-hex').textContent = color;
    }

    function hexToRgb(hex) {
      // Browsers convert hex to rgb in style.background
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgb(${r}, ${g}, ${b})`;
    }

    selectColor('#ef4444');

    // --- WebSocket ---
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}`);

    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    ws.addEventListener('open', () => {
      dot.classList.add('connected');
      statusText.textContent = 'Connected — painting live';
    });

    ws.addEventListener('close', () => {
      dot.classList.remove('connected');
      statusText.textContent = 'Disconnected — refresh to reconnect';
    });

    ws.addEventListener('message', (evt) => {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'init') {
        msg.canvas.forEach((color, i) => { cells[i].style.background = color; });
      } else if (msg.type === 'paint') {
        cells[msg.index].style.background = msg.color;
        cells[msg.index].classList.remove('painted');
        void cells[msg.index].offsetWidth; // reflow to restart animation
        cells[msg.index].classList.add('painted');
      }
    });

    function paintCell(index, color) {
      if (ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'paint', index, color }));
    }
  </script>
</body>
</html>
